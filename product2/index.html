<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دروة الجمل الأصلية</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f8f8f8;
text-align:center;
}

.header{
background:#b8860b;
color:white;
padding:20px;
}

.product-img{
width:90%;
max-width:450px;
margin:15px auto;
border-radius:10px;
}

.price{
font-size:32px;
color:#d62828;
font-weight:bold;
}

.old-price{
text-decoration:line-through;
color:gray;
font-size:20px;
}

.btn{
display:inline-block;
background:#25D366;
color:white;
padding:15px 30px;
text-decoration:none;
border-radius:8px;
font-size:20px;
margin:20px;
}

.features{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
}

.gallery img{
width:300px;
max-width:90%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<h1>دروة الجمل الأصلية</h1>
<p>منتج طبيعي 100%</p>
</div>

<img src="product1.png" class="product-img" alt="صورة المنتج">

<div class="price">149 DH</div>
<div class="old-price">199 DH</div>

<a class="btn" href="https://wa.me/212612414722">
اطلب الآن عبر واتساب
</a>

<div class="features">
<h2>مميزات المنتج</h2>
<p>✔ منتج طبيعي</p>
<p>✔ جودة عالية</p>
<p>✔ سهل الاستعمال</p>
<p>✔ الدفع عند الاستلام</p>
</div>

<h2>صور المنتج</h2>

<div class="gallery">
<img src="product1.png" alt="صورة 1">
<img src="product2.png" alt="صورة 2">
<img src="product3.png" alt="صورة 3">
</div>

<a class="btn" href="https://wa.me/212623331682">
اطلب الآن
</a>

</body>
</html>
